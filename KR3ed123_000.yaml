body:
  text: 腫瘍人參敗毒散加荊芥防風名荊防敗毒散治癰疽疔腫發背乳癰等證增寒壯熱甚至頭痛拘急狀似傷寒者宜服一二劑以衰其毒輕則內自消若至六七日不消可服托裡消毒散人參前胡柴胡羌活獨活川芎桔梗枳殼麩炒茯苓甘草各一錢作一劑水二鍾煎八分食遠服如熱甚或痛甚者加黃芩黃連大便不通量加大黃煨朴硝托裡消毒散治一切癰疽服前藥不消者宜服此藥未成即消已成即潰腐肉易去新肉易生如有瘡口宜貼膏藥斂即不用切忌早敷生肌之藥人參黃耆鹽水拌炒當歸酒拌川芎芍藥炒白朮炒茯苓各一錢白芷金銀花各七分甘草五分作一劑水二鍾煎至八分瘡在上食後服瘡在下食前服仙方活命散治一切癰疽疔腫不問腫潰穿山甲同蛤粉炒黃色甘草節防風沒藥赤芍藥白芷各六分當歸尾乳香各一錢天花粉貝母皂角刺各八分金銀花陳皮各三錢作一劑用酒一大碗同入瓶內紙糊瓶口慢火煎數沸去柤病在上食後服病在下食前服能飲酒者服藥後再飲三兩杯尤好金銀花湯治一切癰疽發背疔瘡及喉閉乳蛾等證用金銀花藤葉搗爛取汁半鍾和熱酒半鍾溫服甚者不過三五服可保無虞忍冬藤酒一名金銀花酒治食膏粱炙煿過多及服金石補藥日久發疽預服免患忍冬藤鮮者五兩乾者一兩大甘草節一兩作一劑用水三鍾煎至二鍾入無灰好酒一鍾再煎十餘沸去柤分三次服能飲酒者一次服另取藤搗爛酒調敷患處中留頭出毒干再搽槐花酒治發背及一切瘡毒不問已成未成但焮痛者並治之用槐花四五兩微炒黃乘熱入酒二鍾煎十餘沸去柤熱服未成者二三服已成者一二服治癰疽發背疔腫惡瘡一二日至五六日不問痛否取大蒜切片如三錢厚置瘡頭上用艾壯於蒜上灸之三壯換蒜痛者灸至不痛不痛者灸至痛毒氣自然隨火而散丹溪云火以暢達拔引郁毒此從治之意若瘡頭多即用大蒜搗爛敷患處攤於蒜上燒之更服槐花酒一二劑若至數日不甚腫痛及不腐潰者此屬血氣不足尤當多炙及服溫補藥切忌寒涼之劑神功散治發背癰疽及諸瘡不問腫潰並治之黃柏炒為末一兩草烏炒為末一兩用漱口水調入香油少許搽患處如干仍用水潤之潰瘍黃耆人參湯治諸瘡潰後食少倦怠口舌乾燥或寒熱往來驚悸少睡並治之黃耆鹽水拌炒三錢人參白朮炒蒼朮米泔水浸炒一錢陳皮一錢當歸酒拌炙甘草一錢麥門冬五分去心胃寒不用神麯五分炒升麻一分黃柏三分酒炒腹不實者去之五味子搗碎炒五分作一劑用水二鍾薑三片煎至一鍾食遠服如少睡加酸棗仁炒一錢肌肉遲生加白斂去皮一錢乳香止痛散治諸瘡潰爛疼痛不忍乳香沒藥各二錢寒水石煅滑石各四錢冰片半分為細末搽患處雄黃解毒散治一切癰腫潰爛毒熱甚者先用此藥二三次以後用豬蹄湯雄黃一兩白礬四兩寒水石一兩煅用滾水二三碗乘熱入前藥一兩洗患處以太乙膏或神異膏貼之豬蹄湯治一切癰疽消腫毒去惡肉潤瘡口止痛白芷黃芩當歸羌活赤芍藥生甘草露蜂房蜂兒多者佳各五錢用豬蹄一雙水四五碗煮熟去油柤入前藥煎數沸去柤溫洗隨用前膏藥貼之神仙蠟礬丸治癰疽及腸癰托裡消毒固臟腑止膿血黃蠟七錢白礬一兩細研熔蠟候溫入礬末和勻丸梧子大每服三五十丸食遠滾湯送下治諸瘡久不合口用炮附子去皮尖為細末唾津和隨瘡大小作餅置患處用艾壯於餅上灸之更服大補氣血藥用江西豆豉為餅多灸之亦效加減八味丸治疽痊後及將痊口乾渴舌或堅黃及未病先渴益腎水制心火肉桂一兩山茱萸用肉酒拌搗膏山藥各四兩澤瀉蒸三兩五味子微炒四兩牡丹皮白者佳白茯苓各二兩熟地黃八兩酒拌搗膏為末入二膏加蜜丸梧子大每服七八十丸空心鹽湯送下太乙靈應膏治一切瘡疽及跌打損傷寒濕疾痛玄參大黃肉桂白芷生地黃芍藥當歸各兩為咀用香油二斤浸五七日煎至黑色去柤徐徐下黃丹一斤再煎二十餘滾滴水成珠即為膏矣加沒藥乳香一兩亦可疔瘡奪命丹治諸般腫毒疔瘡蟾酥輕粉各五分硃砂三錢白礬枯寒水石煅銅緑各一錢蝸牛二十個別研如泥一方無亦可乳香沒藥麝香各一錢為末將蝸牛泥為丸如丸不就加酒糊少許丸如緑豆大每服一二丸用生蒜頭三莖嚼爛同藥以熱酒送下出汗為度無汗再進一服疔瘡之證初生其狀甚微多在四肢頭面骨節之處癢痛難忍增寒壯熱可服荊防敗毒散一二劑或奪命丹一服若有紅絲自瘡向腹走者宜撥破瘡頭去惡血以膏藥封貼如針之不痛可用奪命丹一粒入瘡內毒即消如生唇面口內有紫筋者宜挑斷吐去毒血噙奪命丹一二粒毒入喉入腹俱不治槐花酒治一切疔瘡腫毒方見前忍冬藤酒治一切疔毒及發背癰疽並治之方見前乳癰神效瓜蔞散治乳癰乳勞瓜蔞大者一個搗甘草半兩當歸半兩沒藥另研乳香各一錢另研作一劑用酒三碗煎至二碗分三次食後飲柤熱罨處陳良甫云如有乳勞便服此散可杜絶病根如毒已成能化膿為水毒未成者則從大小便散之消毒散治吹乳乳癰並便毒如增寒壯熱或頭痛者宜先服人參敗毒散一二服方可服此藥如無前證即服此藥二三劑或腫不消宜服托裡藥青皮去白金銀花天花粉柴胡殭蠶炒貝母當歸酒拌白芷各二錢用水二鍾煎至一鍾食遠服如便毒加大黃煨一錢空心服又方治吹乳乳癰不問已成未成用蒲公英一握春時開黃花搗爛入酒半鍾取酒溫服柤貼患處甚者不過三五服即愈瘰癧瘰癧者結核是也或在耳前連及頤頷下至缺盆在鑽子骨陷皆謂瘰癧手少陽三焦經主之或在胸及胸之側皆謂馬刀瘡手少陽膽經主之大抵二經多氣少血初生如豆粒漸如梅李核或一粒或三五粒按之則動而微痛不甚熱惟午後微熱或夜間口乾飲食少思四肢倦怠或堅而不潰潰而不合皆由血氣不足故往往變為瘵勞況其症原不繫膏粱丹毒之變因虛勞氣鬱所致宜以益氣養榮之藥治之其瘡自消若不詳脈證經絡受證之異及虛實之殊概用追蝕毒藥及牽牛斑蝥流氣飲十宣散敗毒散治之則先犯病禁經禁以致血氣愈損反為敗證矣可不慎哉丹溪亦云或有風毒熱毒氣毒之異更宜斟酌而治之益氣養榮湯治抑鬱及勞傷氣血頸項或四肢腫硬或軟而不赤不痛日晡微熱或潰而不斂並治之人參一錢白朮炒二錢茯苓陳皮貝母香附子當歸酒拌川芎黃耆鹽水拌炒熟地黃酒拌芍藥炒桔梗甘草炒各一錢作一劑薑三片用水二鍾煎至八分食遠服胸痞人參熟地黃各減三分口乾加五味子麥門冬往來寒熱加軟柴胡地骨皮膿清加人參黃耆膿多加川芎當歸膿不止加人參黃耆當歸肌肉遲生加白斂官桂夏枯草湯治瘰癧馬刀不問已潰未潰或日久成漏用夏枯草六兩水二鍾煎至七分去柤食遠服此生血治瘰癧之聖藥虛甚當煎濃膏服並塗患處多服益善兼十全大補湯加香附子貝母遠志尤善治瘰癧已成未成已潰未潰以手仰置肩上微舉起則肘骨尖自見是灸處如患在左灸左肘患在右灸右肘若左右俱患兩肘皆灸灸以三四十壯為度更服補劑灸三次瘡自除如患三四年不愈者辰時灸至申時三灸即愈更服益氣養榮湯又方灸瘰癧未成膿者用大蒜切片如三錢厚安患處用艾壯於蒜灸之至三壯換蒜每日灸十數蒜片以拔郁毒如破久不合內有核或瘀肉此因血氣不足不能腐爛以銅錢挺輕輕連衣膜取去縱取重亦不痛不必畏懼更用江西豆豉為末唾津和為餅如前灸之以助陽氣內服補藥外貼琥珀膏或太乙膏瘡口自合又方治瘰癧已破核不腐致瘡口不斂或貼琥珀膏不應用時效針頭散敷之以去腐肉以如神散敷之更服益氣養榮湯若血氣虛者先服益氣養榮湯待氣血稍充方用針頭散仍服前湯如神散治瘰癧已破瘡口未合松香末一兩白礬三錢為細末油調搽干糝亦可散腫潰堅丸治瘰癧馬刀瘡服益氣養榮湯不能消散者宜服此丸五日又服益氣湯五日如此相兼服之不應以針頭散敷之知母酒拌炒黃柏酒拌炒瓜蔞根酒拌昆布酒拌炒桔梗黃耆酒拌炒連翹黃連炒京三稜酒拌炒葛根白芍藥各二錢升麻當歸梢酒拌柴胡甘草各一兩草龍膽四兩酒炒黃芩一錢五分一半酒炒一半生用為細末煉蜜丸如緑豆大每服一百丸或一百五十丸滾湯送下加味敗毒散即荊防敗毒散加牛蒡子玄參治風熱上壅項痛或因怒氣增寒壯熱如四五劑不退宜服益氣養榮湯方見前神祕散治瘰癧服散堅丸及養血氣藥不應者宜進此藥更以養血氣藥服之斑蝥二十一個去頭足翅同糯米炒去米不用為末荊芥穗末二錢黑牽牛末炒一錢直殭蠶末炒二錢和勻每服一錢五更溫酒調下日午惡物從小便中下如小便澀或痛宜以蔥茶湯或木通湯即下更吃米粥補入不下次日五更再服必以下為度若脈細澀或洪大無力者不可服時效針頭散追蝕惡瘡瘀肉赤石半兩乳香白丁香各二錢砒生用黃丹各一錢輕粉麝香蜈蚣一條焙為細末糝於瘀肉上或瘡口小就搽瘡口上肉自去更以膏藥貼之肉亦去嘗用砒末二錢以白礬末二錢和勻同飛過用礬一錢合藥亦效但不及生砒之功速耳琥珀膏治瘰癧腫硬或穿破膿水不絶經久不瘥或成瘻疾及癰疽並貼之更服益氣養榮湯琥珀丁香木香各三錢桂心半兩硃砂細研白芷當歸防風去蘆木鱉子去殼木通各半兩黃丹七兩柳枝三兩松脂二兩麻油一斤二兩內除琥珀丁香桂心硃砂木香為細末余藥銼咀以油浸五日入鐺中以慢火熬候白芷焦色濾去下松脂末及黃丹以柳枝不住手攪滴水中試軟硬如軟再煎得中方入琥珀等末攪勻磁器盛貯用旋攤咽喉口齒清胃散治胃經有熱牙齒或牙齦腫痛或牽引頭腦或面上發熱並治之當歸身酒拌黃連生地黃俱酒製各一錢牡丹皮一錢五分升麻二錢作一劑用水二鍾煎至七分食遠服玄參升麻湯治心脾壅熱舌上生瘡或木舌重舌或連頰兩邊痛腫並治之玄參赤芍藥升麻犀角鎊末桔梗貫衆黃芩各一錢甘草錢半作一劑水二鍾煎八分入犀角食後服槐花散治口舌生瘡玄胡索一兩黃柏半兩密陀僧青黛各二錢為末每用少許敷之有涎吐出再搽碧雲治一切積熱口舌生瘡心煩喉閉及牙齒齒齦作痛芒硝青黛寒水石煅石膏煅各研末飛朴硝馬牙硝甘草滑石各二兩將甘草煎湯二升入諸藥再煎用柳枝不住手攪令消溶入青黛和勻傾砂盆內候冷結凝成霜取霜研為末每用少許含化咽津如喉閉不能咽下用竹管吹藥入喉中金鑰匙治一切喉風及痰涎壅塞水漿不下不識人事者宜刺患處去血即消或刺少商穴在左手人指內側去爪甲韭菜許急者二處並刺復繪圖於後焰硝一兩五錢白殭蠶一錢炒硼砂五錢片腦二分半雄黃二錢研末和勻以竹管吹入喉中有涎吐出內服荊防敗毒散如大便祕加大黃朴硝破關丹治乳蛾喉閉纏喉風等證蓬砂末五錢霜梅肉一兩搗爛二味和勻丸芡實大每服一丸噙化咽下內服荊防敗毒散又方治虛火炎上用炮附子去皮尖切片噙之或研為末用唾津調塗腳心亦可又方用肉桂為末唅之治諸骨鯁用象牙末吹患處又方用五倍子茶葉為末吹患處囊癰加味瀉肝湯治肝經濕熱不利陰囊腫痛或潰爛皮脫睪丸懸挂或便毒及下疳腫痛或潰爛並治之龍膽草酒拌炒當歸梢車前子炒澤瀉生地黃芍藥炒黃連炒黃柏酒拌炒知母酒拌炒防風各一錢甘草梢五分作一劑水二鍾煎八分食前服外敷烏金散烏金散麩炭紫蘇葉為末各等分香油調搽加味小柴胡湯治囊癰腐爛或飲食少思日晡發熱柴胡人參黃芩炒川芎白朮炒黃耆鹽水浸炒當歸酒洗甘草黃柏酒拌炒知母酒拌炒各一錢半夏五分作一劑水二鍾煎八分食前服痛甚加黃連小便不利加木通下疳勝金散治下疳潰爛或疼痛黃連黃柏輕粉硃砂孩兒茶各五分冰片一分為細末香油調搽內服加味瀉肝湯加味瀉肝湯治下疳腫痛或潰爛不愈方見前加味小柴胡湯治下疳潰爛發熱少食方見前痔瘡附便血槐角丸治痔漏腫痛或便血槐角一兩防風地榆枳殼麩炒當歸酒洗各一兩為末煉蜜丸梧桐子大每服五十丸空心滾湯下腫痛或便祕飲槐花酒膿多或倦宜服黃耆人參湯潰而作痛宜服乳香止痛散雙解散治男子交感強固精氣以致精血交錯肛門連拗腫痛大小便澀滯辣桂大黃炒白芍藥澤瀉牽牛炒搗桃仁去皮尖各二錢半甘草五分乾薑一錢作二劑水二鍾煎七分空心並食前服秦艽白朮湯治痔瘡作痛大便乾燥或下血秦艽桃仁去皮尖研膏皂角煅存性枳殼麩炒當歸尾酒拌澤瀉白朮各一錢二分地榆一錢血不止倍之作一劑用水二鍾煎八分食前服祛風潤燥湯治痔瘡焮腫作痛大便祕澀防風荊芥羌活黃連黃芩秦艽枳殼各一錢半當歸酒拌皂角仁去皮燒存性桃仁去皮尖研了澤瀉紅花各一錢大黃煅二錢作一劑用水二鍾煎八分食前服治痔瘡下疳瘡臘月取羊膽一枚入片腦末一分置風處用時以涼水化開頻敷患處內服槐子酒或加味瀉肝湯熊膽更佳如眼痛者點之尤效又方治痔瘡痛不可忍槐樹根七兩不犯鐵搗碎片腦末一分指甲草七顆蜀人呼為芒草採餵豬飢民亦食之高二三寸作一劑用水二鍾煎一小盞入冰片末候溫頻敷患處內服槐子酒無指甲草亦可治便紅用黃連吳茱萸等分熱湯拌濕罨一二日同炒各另為末各糊為丸如梧子大每服一二錢糞前紅服茱萸丸糞後紅服黃連丸俱酒下如四五服不應者乃氣虛不能攝血以六君子湯加黃耆地松治之再不應以補中益氣湯倍加柴胡升麻升舉之切忌寒涼之劑便癰雙解散治男子交感強固精氣致患便癰腫痛或發熱宜用此藥一二服如不消更服補中益氣湯荊防敗毒散治便癰發寒熱或頭痛拘急方見前加味瀉肝湯治便癰腫硬不消或小便澀滯方見前仙主活命飲治便癰不潰痛甚方見前托裡消毒散治便癰不作膿或不潰方見前加味十全大補湯治便癰膿清或不斂方見後神效瓜蔞散治婦女患便癰不潰或痛甚及乳癰一切癰疽等毒並治之方見前補中益氣湯治勞役患便癰不消人參黃耆鹽水拌炒白朮炒各一錢五分當歸酒拌陳皮各一錢柴胡升麻各五分作一劑薑三片棗二枚水二鍾煎八分食前服補骨脂散治不慎房勞患便癰或勞役患此腫痛並治之補骨脂研炒一兩牛蒡子研炒牽牛研炒大黃酒拌炒各五錢為末每服五錢痛甚者一兩空心熱酒調下制甘草治便癰腫痛或焮連莖根方見前懸癰治懸癰以大甘草水一鍾浸透以慢火炙水乾為度如未成膿者四五劑已成膿者一二劑酒煎空心服如小便赤更服清心蓮子飲三四劑及托裡滋陰藥若潰而不斂宜服大補氣血藥不謹守者必成漏證加味小柴胡湯治懸癰焮痛發熱小便赤澀或憎寒發熱方見前清心連子飲治懸癰勢退惟小便赤澀黃芩五錢黃耆蜜炙石蓮肉去心人參赤茯苓各七錢半車前子炒麥門冬去心甘草炙地骨皮制甘草法見前每服一兩用水二鍾煎八分食前服如發熱加柴胡薄荷加味托裡散治懸癰不消不潰人參黃耆鹽水拌炒當歸酒一拌川芎麥門冬去心知母酒拌炒黃柏酒拌炒芍藥炒金銀花柴胡制甘草法見前各一錢作一劑用水二鍾煎八分食前服加味十全大補湯治懸癰潰而不斂或發熱飲食少思人參黃耆鹽水拌炒白朮炒茯苓熟地黃酒拌中滿減五分當歸酒拌川芎芍藥炒各一錢肉桂麥門冬去心五味子搗炒甘草炒各五分作一劑用水二鍾煎一鍾食前服莖腫加青皮熱加黃芩柴胡日晡熱加柴胡地骨皮小便赤加酒製知母黃柏小便澀加車前子山梔子俱炒臁瘡治臁瘡濕毒瘡傷手瘡或遍身熱瘡並治之黃柏末酒炒一兩輕粉三錢為末用豬膽汁調搽干搽亦可內服人參敗毒散去桔梗加蒼朮黃柏隔紙膏治臁瘡濕毒瘡石膏煅研末白礬枯研末各等分桐油調成膏作隔紙膏貼之更服荊防敗毒散如數劑不應宜服人參黃耆湯方見前湯火瘡治湯澆火燒瘡止痛生肌大黃末一兩微炒當歸末一兩用燭油調搽或芝麻油調搽干亦可柏葉散治湯火傷或痛甚柏葉炒梔子仁各一兩鉛粉半兩研為細末以羊骨髓五兩熔化和藥以木椎研良久日塗三五次用燭油調亦可治凍破成瘡或手足皺裂瀝青末一兩黃蠟一兩香油二兩二味熔化搽患處破傷風玉真散治跌打損傷或風入瘡口項強牙關緊急或腰背反張並治之防風天南星炮各等分為末每服三錢小兒一錢用童便一鍾煎七分熱服又方治打撲傷損或蟲獸傷破皮膚風邪入內牙關緊急腰背反張或遍麻木甚者不知人事用蒜搗爛塗傷處將艾壯於蒜上灸之多灸為善仍用膏藥護貼內服玉真散如毒蛇風犬咬傷先刺患處去毒血亦如前法治之小兒丹毒治小兒丹毒多生頭面四肢色赤遊走不定用細磁器擊碎取有鋒芒者一塊以箸一根劈開頭尖夾之用線縛定兩指輕撮筋稍令磁芒正對患處懸寸許再用箸一根頻擊筋頭令毒血遇刺皆出更以神功散敷之內服荊防敗毒散或五福化毒丹入腹者不治五福化毒丹治小兒蘊積毒熱驚惕煩躁煩赤咽乾口舌生瘡夜臥不寧譫語咬牙或頭面遍身多生瘡癤玄參桔梗各一錢茯苓二兩半人參青黛牙硝各一兩甘草七錢五分麝香一字金銀箔十片為末煉蜜丸芡實大一歲者每服一丸薄荷湯化下及治痘疹後餘毒牙齦爛流涎血臭氣以生地黃汁化下更用雞翎掃藥口內治小兒白屑滿口因名曰鵝口瘡不能吮乳用發纏指上蘸井水拭舌如屑不脫濃煮栗木汁以綿纏箸頭拭洗卻用飛過黃丹搽上神仙解毒萬病丹一名太乙丹紫金丹一名神仙太乙丹一名玉樞丹治一切毒及菰子鼠莽菌菌金石或吃疫死牛馬河豚等毒或時行瘟疫山嵐瘴瘧急喉閉纏喉風脾病黃腫赤眼及沖冒寒暑熱毒上攻或自縊或溺水或打撲傷損癰疽發背瘡腫湯火或蛇蟲犬鼠所傷或中邪狂走鬼胎鬼氣並宜服之居家出入不可無此藥真濟世衛身之寶毒藥如嶺南兩廣最多若從宦於此才覺意思不快服之即安彼澗有草曰胡蔓草又名斷腸草陰置水中飲之即死又有取毒蛇殺之以草覆上以水灑之數日菌生其上取為末酒調以毒入始亦無患再飲酒即發立死其或淫婦多與北人配合北人回蜜以藥置食中乃戒之曰子某年來若從其言婦乃以藥解之過期則必死矣名曰定年藥凡北人至彼方亦宜知之若覺中毒四大不調即便服此況彼下藥時必於雞豚等肉投之後再食前物必發其毒急服此一錠或吐或利隨手便瘥昔有一女子久患勞瘵為尸蟲所噬磨一錠服之一時吐下小蟲千餘條後只服蘇合香丸半月遂如常如牛馬六畜中毒亦以此藥救之無不效者文蛤三兩淡紅黃色者搗碎洗淨又名五倍子續隨子去殼研細以紙包壓去油再研一兩山茨菰二兩麝香三錢研紅牙大戟洗淨一兩五錢上各另為細末和勻以糯米粥和勻於木臼中杵千餘下每料分作四十錠於端午重陽七夕合如欲急用辰日亦得勿令婦人孝服不具足人及雞犬之類見之合宜珍重否則無效如癰疽發背未破用冷水磨塗痛處並服良久覺癢立消陰陽二毒傷寒心悶語狂胸膈壅滯邪毒未發及瘟疫山嵐障氣纏喉風冷水入薄荷一葉同研下急中顛邪喝叫亂走鬼胎鬼氣並用暖無灰酒下自縊或落水死心頭暖者及驚死鬼迷死未隔宿者並冷水磨灌下蛇犬蜈蚣傷並用冷水磨塗傷處如腹脹或迷悶者更宜服之諸般瘧疾不問新久臨發時煎楊柳枝湯下小兒急慢驚風五疳八痢蜜水薄荷一葉同磨下牙關緊急磨一錠外塗內服量大小用之牙痛酒磨塗及含少許吞下湯火傷東流水磨塗傷處打撲傷損炒松節酒下年深日久頭痛太陽疼用酒入薄荷磨紙花貼太陽穴上並服之諸般癇疾口眼歪邪眼目掣眨夜多睡涎言語蹇澀卒中風口禁牙關緊急筋脈攣縮骨節風腫手腳疼痛行步艱難一應風氣疼痛並用酒磨下有孕婦人不可服余治一婦人腹內結塊久而不消一婦人月經過期不至腹內作痛服破血行氣之劑不效服之並痊一婦人苦頭風作暈數年亦服之吐痰碗許遂不再發一男子喉閉水漿難下一男子纏喉風痰涎壅盛一婦人中風牙關緊急痰涎溢出隨服並愈一男子便毒堅硬一男子患痔未成膿苦痛大便俱難始進一錠後去二次痛即止不日而消一男子患發背瘡頭如粟重如負石內服外塗後去三四次每去肛門如炙即日而瘳三男子剝自死牛即日遍身患紫泡不計其數已而俱潰各灌一錠吐瀉而蘇一藥不下者而死一小兒昏憒六日不省一小兒驚風發搦諸藥不效挖口灌之並蘇一男子中風牙關緊急口出涎水亦灌之尋愈一女子為邪所交腹作痞服之隨下惡物其邪仍至又服半錠每夜更灸二三錠使煙氣盈屋遂不再至一家患傳尸勞兄弟五人已死者三人有方士令服此藥遂各進一錠一下惡物如膽狀一下死蟲如蛾形俱獲生其人遂以此藥廣濟尸證無不驗者余常用治一切雜病及瘡疽等毒未成膿者甚效其已成膿者亦能殺大勢考其藥品雖不言補今羸瘦之人服之並效誠神劑也然以價計之用銀三錢藥有七十錠可救七十人有力之家當合之以濟人近人制此往往加以硃砂雄黃考之諸方並無此味余故不用恐亂其真也識者當自知之
